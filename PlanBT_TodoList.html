            text-align: center;

            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        header h1 {
            font-size: 2em;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 15px 0 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 6px;
            transition: width 0.4s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 0.95em;
            color: #aaa;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .controls button:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .section {
            margin-bottom: 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .section-header:hover {
            background: rgba(255,255,255,0.05);
        }

        .section-header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header .arrow {
            transition: transform 0.3s;
            font-size: 0.8em;
            color: #888;
        }

        .section-header .arrow.collapsed {
            transform: rotate(-90deg);
        }

        .section-header h2 {
            font-size: 1.05em;
            font-weight: 600;
            color: #ddd;
        }

        .section-header .badge {
            font-size: 0.75em;
            background: rgba(0,210,255,0.15);
            color: #00d2ff;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .section-body {
            padding: 0 18px 14px;
        }

        .section-body.hidden {
            display: none;
        }

        .subsection {
            margin: 8px 0 8px 10px;
        }

        .subsection-title {
            font-size: 0.9em;
            color: #888;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subsection-title .arrow {
            transition: transform 0.3s;
            font-size: 0.7em;
            color: #666;
        }

        .subsection-title .arrow.collapsed {
            transform: rotate(-90deg);
        }

        .subsection-body.hidden {
            display: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin: 3px 0;
            border-radius: 8px;
            transition: background 0.2s;
            gap: 10px;
        }

        .file-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .file-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 5px;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: all 0.2s;
        }

        .file-item input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-color: transparent;
        }

        .file-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 13px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .file-item label {
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: baseline;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .file-item input[type="checkbox"]:checked + label {
            opacity: 0.45;
            text-decoration: line-through;
        }

        .file-name {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.88em;
            color: #e8c170;
        }

        .file-desc {
            font-size: 0.8em;
            color: #777;
        }

        .icon {
            font-size: 1em;
            flex-shrink: 0;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 0.8em;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            header h1 { font-size: 1.4em; }
            .file-item { padding: 6px 8px; }
        }
    </style>

            }
        ];

        const STORAGE_KEY = 'planbt_todo_state';
        let fileIndex = 0;

        function loadState() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch { return {}; }
        }

        function saveState() {
            const state = {};
            document.querySelectorAll('.file-checkbox').forEach(cb => {
                if (cb.checked) state[cb.dataset.id] = true;
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function updateProgress() {
            const all = document.querySelectorAll('.file-checkbox');
            const checked = document.querySelectorAll('.file-checkbox:checked');
            const total = all.length;
            const done = checked.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${done} / ${total} 已完成 (${pct}%)`;
        }

        function renderFiles(files, container, state) {
            files.forEach(f => {
                const id = 'file_' + fileIndex++;
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <input type="checkbox" class="file-checkbox" id="${id}" data-id="${id}" ${state[id] ? 'checked' : ''}>
                    <label for="${id}">
                        <span class="file-name">${f.name}</span>
                        <span class="file-desc">${f.desc}</span>
                    </label>
                `;
                container.appendChild(div);
            });
        }

        function renderList() {
            const list = document.getElementById('todoList');
            const state = loadState();
            list.innerHTML = '';

            data.forEach((group, gi) => {
                const sec = document.createElement('div');
                sec.className = 'section';

                // 计算该 section 的文件总数
                let totalFiles = (group.files || []).length;
                if (group.subsections) {
                    group.subsections.forEach(sub => totalFiles += sub.files.length);
                }

                sec.innerHTML = `
                    <div class="section-header" data-target="sec_body_${gi}">
                        <div class="left">
                            <span class="arrow">▼</span>
                            <span class="icon">${group.icon}</span>
                            <h2>${group.section}</h2>
                        </div>
                        <span class="badge">${totalFiles} 个文件</span>
                    </div>
                    <div class="section-body" id="sec_body_${gi}"></div>
                `;

                const body = sec.querySelector('.section-body');

                // 渲染主文件列表
                if (group.files && group.files.length > 0) {
                    renderFiles(group.files, body, state);
                }

                // 渲染子目录
                if (group.subsections) {
                    group.subsections.forEach((sub, si) => {
                        const subDiv = document.createElement('div');
                        subDiv.className = 'subsection';
                        const subId = `sub_${gi}_${si}`;
                        subDiv.innerHTML = `
                            <div class="subsection-title" data-target="${subId}">
                                <span class="arrow">▼</span>
                                📁 ${sub.title}
                            </div>
                            <div class="subsection-body" id="${subId}"></div>
                        `;
                        const subBody = subDiv.querySelector('.subsection-body');
                        renderFiles(sub.files, subBody, state);
                        body.appendChild(subDiv);
                    });
                }

                list.appendChild(sec);
            });

            // 绑定事件
            document.querySelectorAll('.file-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    saveState();
                    updateProgress();
                });
            });

            // 折叠/展开 section
            document.querySelectorAll('.section-header').forEach(h => {
                h.addEventListener('click', () => {
                    const target = document.getElementById(h.dataset.target);
                    const arrow = h.querySelector('.arrow');
                    target.classList.toggle('hidden');
                    arrow.classList.toggle('collapsed');
                });
            });

            // 折叠/展开 subsection
            document.querySelectorAll('.subsection-title').forEach(h => {
                h.addEventListener('click', () => {
                    const target = document.getElementById(h.dataset.target);
                    const arrow = h.querySelector('.arrow');
                    target.classList.toggle('hidden');
                    arrow.classList.toggle('collapsed');
                });
            });

            updateProgress();
        }

        function toggleAll(checked) {
            document.querySelectorAll('.file-checkbox').forEach(cb => cb.checked = checked);
            saveState();
            updateProgress();
        }

        function expandAll(expand) {
            document.querySelectorAll('.section-body').forEach(el => {
                if (expand) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
            document.querySelectorAll('.subsection-body').forEach(el => {
                if (expand) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
            document.querySelectorAll('.arrow').forEach(a => {
                if (expand) a.classList.remove('collapsed');
                else a.classList.add('collapsed');
            });
        }

        function clearStorage() {
            if (confirm('确定要重置所有进度吗？')) {
                localStorage.removeItem(STORAGE_KEY);
                fileIndex = 0;
                renderList();
            }
        }

        // 初始化
        renderList();
    </script>
</body>
</html>
